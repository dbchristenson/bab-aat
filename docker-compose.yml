# Define a named volume for persistent Postgres data
volumes:
  postgres_data:

services:
  web:
    build:
      context: .
      dockerfile: build.Dockerfile
    image: bab-aat:latest
    ports:
      - "8080:8080"
    environment:
      DJANGO_SETTINGS_MODULE: "babaatsite.settings"
      SECRETS_BASE_DIR: ""
    command: >
      uv run uvicorn babaatsite.asgi:application
        --host 0.0.0.0
        --port 8080
        --log-level info
    env_file:
      - ".env"
    volumes:
      - ./resources/media:/app/resources/media
    depends_on:
      - db   # <-- Wait for db to be ready
      - redis # <-- Wait for redis to be ready
    deploy:
      resources:
        limits:
          memory: 2G

  worker:
    # No 'build' needed; it uses the same image as 'web'
    image: bab-aat:latest
    environment:
      DJANGO_SETTINGS_MODULE: "babaatsite.settings"
    command: >
      sh -c "uv run modal token set --token-id $$MODAL_TOKEN_ID --token-secret $$MODAL_TOKEN_SECRET &&
        uv run celery -A babaatsite worker --pool prefork --concurrency 2 --loglevel info"
    env_file:
      - ".env"
    volumes:
      - ./resources/media:/app/resources/media
    depends_on:
      - db   # <-- Wait for db to be ready
      - redis # <-- Wait for redis to be ready
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # NEW: Adds a Redis container for local Celery
  redis:
    image: "redis:7-alpine"
    restart: always
    ports:
      - "6379:6379" # Expose to host machine for debugging

  # NEW: Adds a Postgres container for your local database
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data # Use the named volume
    environment:
      # These credentials are for local dev only
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "babaatsite"
    ports:
      - "5432:5432" # Expose to host machine for debugging